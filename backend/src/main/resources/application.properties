# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:financetracker.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Secret
app.jwt.secret=94a08da1fecbb6e8b46990538c7b50b2a75163b2dbf2b84eb4a180f97063d12d
app.jwt.expirationMs=86400000

# CORS (comma-separated; override in production via APP_CORS_ALLOWED_ORIGINS)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Server
server.port=8080

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
